<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% if refresh_seconds %}
      <meta http-equiv="refresh" content="{{ refresh_seconds }}">
    {% endif %}
    <title>{% block title %}Buntzen Pass Bot{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/app.css') }}">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/" aria-label="Buntzen Pass Bot dashboard">
        <span class="brand-mark">BP</span>
        <span>
          <strong>Buntzen Pass Bot</strong>
          <small>LAN booking dashboard</small>
        </span>
      </a>
      <nav class="nav">
        <a href="/" class="{{ 'active' if active_page == 'dashboard' else '' }}">Dashboard</a>
        <a href="/jobs" class="{{ 'active' if active_page == 'jobs' else '' }}">Jobs</a>
        <a href="/instances/new" class="nav-primary">New Instance</a>
      </nav>
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
